# ==================== ModernZ Gruvbox Dark ====================

# Layout & Behavior
layout=modern
icon_style=fluent
scale=1.0
show_title=yes
show_chapter=yes
show_progress_bar=yes
show_thumbnail=yes
thumbnail_size=240

# === Gruvbox Colors ===
color_background=282828
color_foreground=ebdbb2
color_hover=fe8019
color_active=fe8019
color_border=3c3836
color_inactive=665c54

seekbar_color=fe8019
seekbar_bg_color=504945
seekbar_foreground=fe8019

# Volume & other accents
volume_color=fe8019

# Subtitle styling
sub_color=ebdbb2
sub_border_color=1d2021
sub_border_size=3.5

# Font & size
font_size=20
title_font_size=24
chapter_font_size=18

# Timings (feels snappier)
animation_duration=180
fade_duration=200
