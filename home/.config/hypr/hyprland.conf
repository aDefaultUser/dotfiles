monitor=,2560x1440@180,auto,1.0

$terminal = foot
$fileManager = pcmanfm-qt
$menu = fuzzel
$reload_waybar = pkill waybar; waybar &


exec-once = waybar & swaybg -o DP-1 -i /home/fcc/walls/wall.png -m fill & hypridle & 

exec-once = /usr/libexec/xdg-desktop-portal -r &
exec-once = /usr/libexec/xdg-desktop-portal-gtk -r &
exec-once = /usr/libexec/xdg-desktop-portal-hyprland &
exec-once = gentoo-pipewire-launcher &


env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = GTK_THEME,Gruvbox-B-MB-Dark
env = QT_QPA_PLATFORMTHEME,qt6ct        
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

ecosystem {
  enforce_permissions = true
  permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
  permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
  permission = /usr/(bin|local/bin)/grim, screencopy, allow
  permission = /usr/(bin|local/bin)/hyprpicker, screencopy, allow
  no_donation_nag = true
  no_update_news = true
}

general {
  gaps_in = 2
  gaps_out = 2
  border_size = 1
  no_focus_fallback = true
  col.active_border = rgb(CC241D)
  resize_on_border = false
  allow_tearing = false

    layout = master
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
       }

    blur {
        enabled = false
       }
}

animations {
enabled = no
}

render {
  expand_undersized_textures = false
  direct_scanout = 1
  cm_fs_passthrough = 1
  new_render_scheduling = true 
  non_shader_cm = 1
  cm_sdr_eotf = 3
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = slave
    mfact = 0.5
    special_scale_factor = 0.5
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =
    repeat_rate = 35
    repeat_delay = 200
    follow_mouse = 1
    sensitivity = 0 

}


cursor {
    inactive_timeout = 30
    no_hardware_cursors = true
}

$mainMod = SUPER 

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec,/$reload_waybar
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 

bind = $mainMod, L, exec, pactl set-sink-mute @DEFAULT_SINK@ 1 && swaylock

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, Shift+left, movewindow, left
bind = $mainMod, Shift+right, movewindow, right
bind = $mainMod, Shift+up, movewindow, up
bind = $mainMod, Shift+down, movewindow, down

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic 


bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindm = SUPER, mouse:272, movewindow
bindc = SUPER, mouse:272, togglefloating

bind = , PRINT, exec, hyprshot -m region --clipboard
workspace = s[true], gapsin:50, gapsout:20


windowrule = match:class steam, workspace 9 silent, no_blur on
windowrule = match:class xdg-desktop-portal-gtk, float on
windowrule = match:class org.keepassxc.KeePassXC, float on, center on
windowrule = match:class hyprland-share-picker, float on
windowrule = match:float true, match:fullscreen false, opacity 0.9
windowrule = match:class ^(Tor Browser)$, float on
windowrule = match:class ^(Tor Browser)$, suppress_event fullscreen maximize
windowrule = match:class ^(Tor Browser)$, fullscreen 0
windowrule = match:class ^(Tor Browser)$, maximize 0
windowrule = match:class ^(Tor Browser)$, size 1200 800
windowrule = match:class ^(Tor Browser)$, center on


