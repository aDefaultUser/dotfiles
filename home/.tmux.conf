# User-friendly tmux config

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g mouse on
set -g default-terminal "screen-256color"
set -g status-utf8 on
set -sg escape-time 1

set -g status on
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 90

set -g status-left "#[fg=green]Session: #[fg=yellow]#S "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=magenta]%H:%M #[fg=yellow]#h "
set -g status-bg black
set -g status-fg white
set -g status-style bold
setw -g window-status-current-format "#[fg=black,bg=green] #I:#W #[default]"
setw -g window-status-format "#[fg=white,bg=black] #I:#W #[default]"

bind | split-window -h
bind - split-window -v
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

setw -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
