COMMON_FLAGS="-O3 -pipe -march=znver5 -flto=thin" 

CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

LDFLAGS="-fuse-ld=lld -rtlib=compiler-rt -unwindlib=libunwind -Wl,--as-needed"

CC="clang"
CPP="clang-cpp"
CXX="clang++"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"

RUSTFLAGS="-C target-cpu=znver5"

FEATURES="ccache candy sandbox parallel-fetch parallel-install binpkg-request-signature userfetch userpriv usersandbox"

EMERGE_DEFAULT_OPTS="--tree --verbose --keep-going=y --load-average=28.0 -j2"

PORTAGE_SCHEDULING_POLICY="idle"

MAKEOPTS="-j30 -l30"

VIDEO_CARDS="amdgpu radeonsi zink"
INPUT_DEVICES="libinput"

MODULES_SIGN_KEY="/var/lib/sbctl/keys/db/db.key"
MODULES_SIGN_CERT="/var/lib/sbctl/keys/db/db.pem"

SECUREBOOT_SIGN_KEY="/var/lib/sbctl/keys/db/db.key"
SECUREBOOT_SIGN_CERT="/var/lib/sbctl/keys/db/db.pem"

POLICY_TYPES="mcs"

LC_MESSAGES="C.UTF-8"

CPU_FLAGS_X86="aes avx avx2 avx512_bf16 avx512_bitalg avx512_vbmi2 avx512_vnni avx512_vp2intersect avx512_vpopcntdq avx512bw avx512cd avx512dq avx512f avx512ifma avx512vbmi avx512vl avx_vnni bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3 vpclmulqdq"

USE_SECURITY="verify-sig modules-sign secureboot"

USE_DESKTOP="-gnome -kde -X -xorg -xrandr"

USE_TOOLKITS="-gtk -gtk2 -gtk3 gtk4 -qt5 qt6 wayland xwayland"

USE_AUDIO="opus flac alsa pipewire pulseaudio system-pipewire vaapi x264 openh264 screencast ffmpeg"

USE_GRAPHICS="vulkan opengl opencl"

USE_SYSTEM="zstd elogind udev dbus acl bpf privsep flatpak -suid -systemd -cups -bluetooth -wifi -dvd -css -branding -telemetry -debug -docs -nfc -gnome-shell system-png system-libvpx system-libevent system-jpeg ssl system-ffmpeg system-icu system-harfbuzz system-av1 openmp v4l io-uring jit pgo"

USE_BUILD="clang lto strip"

USE_MISC="minimal"

USE="
    ${USE_SECURITY}
    ${USE_DESKTOP}
    ${USE_TOOLKITS}
    ${USE_AUDIO}
    ${USE_GRAPHICS}
    ${USE_SYSTEM}
    ${USE_BUILD}
    ${USE_MISC}
"
