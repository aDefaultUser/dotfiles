# ~/.config/fuzzel/fuzzel.ini

font=monospace:size=12
use-bold=yes
dpi-aware=no

terminal=rio -e

icons-enabled=yes
icon-theme= Papirus-Dark, Adwaita     # fallback order — change to your preferred icon theme

prompt="> "
horizontal-pad=20
vertical-pad=12

match-counter=yes
list-executables-in-path=yes

lines=8               # 5→8 is usually a nicer default with icons
width=50              # characters — feels more balanced with icons

show-actions=yes

[colors]
background=282828ff    # gruvbox dark0
text=ebdbb2ff          # gruvbox fg0 / light beige

# Input / prompt area
input=3c3836ff         # dark0_hard – cleaner contrast under prompt
prompt=d79921ff        # gruvbox yellow
counter=928374ff       # gruvbox gray_244 (subtle)

# Matches & selection
match=b8bb26ff         # gruvbox bright green
selection=504945ff     # gruvbox bg1
selection-text=ebdbb2ff
selection-match=fe8019ff   # gruvbox bright orange (highlighted match in selection)

# Border & visual separation
border=d65d0eff        # gruvbox bright red
border-width=3         # 4→3 often looks crisper
border-radius=0

# You can also add (uncomment if wanted):
# highlight=d65d0eff   # bright red highlight (for e.g. keybinding hints)
