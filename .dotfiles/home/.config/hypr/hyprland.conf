################
### MONITORS ###
################

monitor=,2560x1440@180,auto,1.0


###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = nemo
$menu = fuzzel
$reload_waybar = pkill waybar; waybar &

#################
### AUTOSTART ###
#################

exec-once = waybar & awww-daemon &
exec-once = awww img /home/fcc/walls/wall2.png
exec-once = /usr/lib/xdg-desktop-portal &
exec-once = /usr/lib/xdg-desktop-portal-hyprland &

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland



ecosystem {
  enforce_permissions = true
  permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
  permission = /usr/(bin|local/bin)/hyprpm, plugin, allow
  permission = /usr/(bin|local/bin)/hyprpicker, screencopy, allow
  permission = /usr/(bin|local/bin)/grim, screencopy, allow
  no_donation_nag = true
  no_update_news = true
}

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 1
    no_focus_fallback = true

    resize_on_border = false
    allow_tearing = false

    layout = master
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
  enabled = yes, please :)

  # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

  bezier = linear,0,0,1,1
	bezier = yeet,0.3, -0.5,0,1
	bezier = easeInOutExpo,0.87, 0, 0.13, 1
	bezier = easeOutQuart, 0.25, 1, 0.5, 1
	bezier = easeInOutBack, 0.68, -0.55, 0.265, 1.55
	bezier = easeOutBack, 0.175, 0.885, 0.265, 1.55
	bezier = noFadeOut, 1, 0, 1, 0

	animation = global, 0 # Disable all default animations

	# Fade (no fade, just for compat)
	animation = fadeOut, 1, 1, noFadeOut

	# Windows
	animation = windowsIn, 1, 1.5, easeOutBack, gnomed
	animation = windowsOut, 1, 1.5, yeet, gnomed
	animation = windowsMove, 1, 3, easeInOutBack, slide

	# Workspaces
  animation = workspaces, 1, 0.5, default, slide
	animation = specialWorkspace, 1, 2, yeet, slidefadevert 100%
}

render {
  expand_undersized_textures = false
  direct_scanout = 1
  cm_fs_passthrough = 1
  new_render_scheduling = true 
  non_shader_cm = 1
  cm_sdr_eotf = 3
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = slave
    mfact = 0.5
    special_scale_factor = 0.8
}

misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = false 
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_rate = 35
    repeat_delay = 200

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 30
    no_hardware_cursors = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec, $reload_waybar
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic 
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , Print,		exec,	flameshot gui

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}
